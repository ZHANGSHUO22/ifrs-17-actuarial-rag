<!DOCTYPE html>
<html>
<head>
    <title>System Bootstrapping</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #2c3e50; margin-bottom: 0.5rem; }
        p { color: #7f8c8d; font-size: 0.9rem; }
        .status-list { text-align: left; margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1rem; }
        .step { display: flex; align-items: center; margin-bottom: 0.5rem; font-size: 0.85rem; color: #95a5a6; }
        .step.active { color: #2980b9; font-weight: bold; }
        .step.done { color: #27ae60; }
        .step.done::before { content: '✓ '; margin-right: 8px; }
        .step.active::before { content: '→ '; margin-right: 8px; }
        .step.pending::before { content: '○ '; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h2>Initializing Copilot</h2>
        <p id="main-status">Preparing environment...</p>
        <div class="status-list" id="steps">
            <div class="step" id="step-1">Installing Python dependencies</div>
            <div class="step" id="step-2">Starting FastAPI Backend</div>
            <div class="step" id="step-3">Downloading Actuarial Models</div>
            <div class="step" id="step-4">Launching Streamlit UI</div>
        </div>
    </div>
    <script>
        async function checkStatus() {
            try {
                const res = await fetch('/status.json');
                const data = await res.json();
                document.getElementById('main-status').innerText = data.message;
                
                // Update steps
                for(let i=1; i<=4; i++) {
                    const el = document.getElementById('step-' + i);
                    if (i < data.step) el.className = 'step done';
                    else if (i === data.step) el.className = 'step active';
                    else el.className = 'step pending';
                }

                if (data.ready) {
                    document.getElementById('main-status').innerText = "Ready! Redirecting...";
                    setTimeout(() => window.location.reload(), 2000);
                }
            } catch(e) {}
        }
        setInterval(checkStatus, 1000);
    </script>
</body>
</html>
